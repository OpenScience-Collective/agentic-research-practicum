<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1100 660"
     width="170mm" height="102mm"
     font-family="Helvetica, Arial, sans-serif">
  <title>Figure 2. Naturalness gradient crossed with developmental cohort coverage</title>
  <desc>Stimulus naturalness (x-axis) versus participant cohort age (y-axis). Markers are sized by number of corpus cards and shaped by modality. The child-cohort EEG-ERSP cell at character animation is highlighted as the empty cell of interest.</desc>

  <rect width="1100" height="660" fill="#ffffff"/>

  <text x="40" y="30" font-size="22" font-weight="600" fill="#000000">Figure 2. Naturalness gradient and developmental cohort coverage</text>
  <text x="40" y="50" font-size="15" fill="#444444">Marker size encodes number of cards in the four-strand corpus. Modality is encoded by shape and colour. The empty cell at (child, character animation, EEG ERSP) is highlighted.</text>

  <!-- Plot area -->
  <g transform="translate(150,90)">
    <rect x="0" y="0" width="900" height="380" fill="#f6f6f6" stroke="#cccccc" stroke-width="0.5"/>

    <!-- Vertical gridlines, 6 columns: 0, 150, 300, 450, 600, 750, 900 -->
    <line x1="150" y1="0" x2="150" y2="380" stroke="#dddddd" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="380" stroke="#dddddd" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="450" y2="380" stroke="#dddddd" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="380" stroke="#dddddd" stroke-width="0.5"/>
    <line x1="750" y1="0" x2="750" y2="380" stroke="#dddddd" stroke-width="0.5"/>

    <!-- Horizontal gridlines for the three cohort rows -->
    <line x1="0" y1="126" x2="900" y2="126" stroke="#dddddd" stroke-width="0.5"/>
    <line x1="0" y1="252" x2="900" y2="252" stroke="#dddddd" stroke-width="0.5"/>

    <!-- Highlight the empty cell: child (y=252-380) x character animation (x=600-750) -->
    <rect x="600" y="252" width="150" height="128" fill="#F0E442" fill-opacity="0.32" stroke="#D55E00" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="675" y="268" font-size="15" font-weight="600" text-anchor="middle" fill="#333333">target: per-shot EEG ERSP</text>
    <text x="675" y="280" font-size="14" text-anchor="middle" fill="#333333">(0-500 ms post-shot-onset)</text>

    <!-- Y axis labels (cohorts) -->
    <text x="-10" y="68" font-size="16" text-anchor="end" fill="#000000">adult</text>
    <text x="-10" y="194" font-size="16" text-anchor="end" fill="#000000">adolescent</text>
    <text x="-10" y="320" font-size="16" text-anchor="end" fill="#000000">child</text>

    <!-- X axis labels (stimulus types) -->
    <text x="75" y="400" font-size="15" text-anchor="middle" fill="#000000">controlled</text>
    <text x="75" y="412" font-size="15" text-anchor="middle" fill="#000000">gratings</text>

    <text x="225" y="400" font-size="15" text-anchor="middle" fill="#000000">static</text>
    <text x="225" y="412" font-size="15" text-anchor="middle" fill="#000000">photographs</text>

    <text x="375" y="400" font-size="15" text-anchor="middle" fill="#000000">Heider-Simmel</text>
    <text x="375" y="412" font-size="15" text-anchor="middle" fill="#000000">triangles</text>

    <text x="525" y="400" font-size="15" text-anchor="middle" fill="#000000">abstract</text>
    <text x="525" y="412" font-size="15" text-anchor="middle" fill="#000000">animation</text>

    <text x="675" y="400" font-size="15" text-anchor="middle" fill="#000000">character</text>
    <text x="675" y="412" font-size="15" text-anchor="middle" fill="#000000">animation</text>

    <text x="825" y="400" font-size="15" text-anchor="middle" fill="#000000">live-action</text>
    <text x="825" y="412" font-size="15" text-anchor="middle" fill="#000000">film</text>

    <text x="450" y="438" font-size="15" font-style="italic" text-anchor="middle" fill="#666666">naturalness gradient</text>

    <!-- Axis arrow -->
    <line x1="0" y1="380" x2="900" y2="380" stroke="#000000" stroke-width="0.7" marker-end="url(#xarrow)"/>
    <line x1="0" y1="380" x2="0" y2="0" stroke="#000000" stroke-width="0.7"/>

    <!-- Data markers. Coordinates: (centre of cell). Shape encodes modality: circle=fMRI, square=EEG, triangle=MEG, diamond=iEEG. Colour by modality. Size by number of cards approx. -->

    <!-- Adult row (y=63) -->
    <!-- gratings, adult: fMRI (Hubel/V1 etc), EEG (VEP). Many cards. -->
    <circle cx="75" cy="63" r="11" fill="#0072B2" fill-opacity="0.85"/>
    <rect x="60" y="48" width="14" height="14" fill="#D55E00" fill-opacity="0.85"/>

    <!-- static photographs, adult: fMRI (IAPS etc), EEG (alpha/emotion review). -->
    <circle cx="225" cy="63" r="9" fill="#0072B2" fill-opacity="0.85"/>
    <rect x="210" y="48" width="14" height="14" fill="#D55E00" fill-opacity="0.85"/>

    <!-- Heider-Simmel triangles, adult: fMRI (Castelli). -->
    <circle cx="375" cy="63" r="8" fill="#0072B2" fill-opacity="0.85"/>

    <!-- abstract animation, adult: fMRI (Inscapes adult tests). MEG (Lankinen silent-visual). -->
    <circle cx="525" cy="63" r="8" fill="#0072B2" fill-opacity="0.85"/>
    <polygon points="540,53 549,71 531,71" fill="#009E73" fill-opacity="0.85"/>

    <!-- character animation, adult: fMRI (Pixar shorts adult condition). -->
    <circle cx="675" cy="63" r="7" fill="#0072B2" fill-opacity="0.85"/>

    <!-- live-action film, adult: fMRI (Hasson, Bartels, Nishimoto, ...). EEG ISC (Dmochowski). iEEG (Nentwich). -->
    <circle cx="825" cy="63" r="13" fill="#0072B2" fill-opacity="0.85"/>
    <rect x="810" y="48" width="14" height="14" fill="#D55E00" fill-opacity="0.85"/>
    <polygon points="841,53 850,71 832,71" fill="#009E73" fill-opacity="0.85"/>
    <polygon points="855,55 870,63 855,71 845,63" fill="#CC79A7" fill-opacity="0.85"/>

    <!-- Adolescent row (y=189) -->
    <!-- static photographs, adolescent: behavioural cuteness (Borgi covers 3-6). -->

    <!-- character animation, adolescent: EEG-ISC (Petroni partly covers up to age 21). -->
    <rect x="660" y="174" width="14" height="14" fill="#D55E00" fill-opacity="0.55"/>

    <!-- Child row (y=315) -->
    <!-- static photographs, child: behavioural cuteness (Borgi 3-6). -->
    <text x="225" y="319" font-size="21" fill="#444444" font-weight="700" text-anchor="middle">b</text>

    <!-- Heider-Simmel triangles, child: fMRI autism (Castelli 2002). -->
    <circle cx="375" cy="315" r="7" fill="#0072B2" fill-opacity="0.85"/>

    <!-- abstract animation, child: fMRI (Inscapes pediatric). -->
    <circle cx="525" cy="315" r="8" fill="#0072B2" fill-opacity="0.85"/>

    <!-- character animation, child: fMRI Pixar shorts (Richardson-Saxe), EEG-ISC (Petroni partly).
         8-px gap between markers per figure-qa report. -->
    <circle cx="655" cy="315" r="8" fill="#0072B2" fill-opacity="0.85"/>
    <rect x="688" y="308" width="14" height="14" fill="#D55E00" fill-opacity="0.45" stroke="#D55E00" stroke-dasharray="2 2"/>

    <!-- live-action film, child: behavioural (Klin autism eye-tracking). -->
    <text x="825" y="319" font-size="21" fill="#444444" font-weight="700" text-anchor="middle">b</text>
  </g>

  <!-- Legend bottom -->
  <g transform="translate(150,570)">
    <text x="0" y="0" font-size="16" font-weight="600" fill="#000000">Modality (shape and colour):</text>

    <circle cx="195" cy="-3" r="6" fill="#0072B2" fill-opacity="0.85"/>
    <text x="206" y="0" font-size="15" fill="#000000">fMRI</text>

    <rect x="248" y="-9" width="12" height="12" fill="#D55E00" fill-opacity="0.85"/>
    <text x="263" y="0" font-size="15" fill="#000000">EEG</text>

    <polygon points="312,-9 322,7 302,7" fill="#009E73" fill-opacity="0.85"/>
    <text x="328" y="0" font-size="15" fill="#000000">MEG</text>

    <polygon points="367,-7 379,0 367,7 357,0" fill="#CC79A7" fill-opacity="0.85"/>
    <text x="385" y="0" font-size="15" fill="#000000">iEEG</text>

    <text x="430" y="0" font-size="15" fill="#000000" font-style="italic">b</text>
    <text x="442" y="0" font-size="15" fill="#000000">= behavioural-only card</text>

    <text x="600" y="0" font-size="15" fill="#000000">Marker size scales with number of cards in cell.</text>
  </g>

  <text x="40" y="630" font-size="14" fill="#666666">Sources: research/synthesis/dataset-hierarchy.md, science-map.md Theme 3, and four *-ontology.md files. Marker placement reflects representative cards, not exhaustive enumeration.</text>

  <defs>
    <marker id="xarrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#000000"/>
    </marker>
  </defs>
</svg>
