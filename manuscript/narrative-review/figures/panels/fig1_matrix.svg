<svg xmlns="http://www.w3.org/2000/svg"
     width="174mm" height="130mm" viewBox="0 0 493 369"
     font-family="Helvetica, Arial, sans-serif">
  <title>Figure 1 panel. Four-perspective strand map.</title>
  <desc>4 perspective columns by 15 theme rows. Filled circles = substantial; outlined = peripheral.</desc>

  <rect width="493" height="369" fill="#ffffff"/>

  <text x="8" y="16" font-size="11" font-weight="600" fill="#000000">Figure 1. Four-perspective strand map</text>
  <text x="8" y="29" font-size="7" fill="#444444">Perspectives (columns) by corpus themes (rows). Filled circles denote substantial contribution.</text>

  <!-- Column header rects -->
  <rect x="184" y="42" width="62" height="17" fill="#0072B2" rx="2"/>
  <text x="215" y="54" font-size="7.5" font-weight="600" fill="#ffffff" text-anchor="middle">Psychophysics</text>

  <rect x="258" y="42" width="62" height="17" fill="#D55E00" rx="2"/>
  <text x="289" y="54" font-size="7.5" font-weight="600" fill="#ffffff" text-anchor="middle">Action</text>

  <rect x="332" y="42" width="62" height="17" fill="#009E73" rx="2"/>
  <text x="363" y="54" font-size="7.5" font-weight="600" fill="#ffffff" text-anchor="middle">Language</text>

