project_root

# Style: 100-col line, 4-space tab width. miss_hit has no `indent` option;
# tab_width controls the assumed visual width of literal tabs.
line_length: 120
tab_width: 4
copyright_entity: ""

# Suppress rules that fight EEGLAB's existing API conventions and the
# project's snake_case helper style. Keep semantic rules (end-of-statements,
# operator and comma whitespace) that catch real bugs.
suppress_rule: "copyright_notice"
suppress_rule: "indentation"
suppress_rule: "naming_functions"
suppress_rule: "naming_parameters"
suppress_rule: "whitespace_comments"
suppress_rule: "redundant_brackets"
# `if X; do(); end` one-liners are idiomatic for short guards in this code.
suppress_rule: "end_of_statements"
