name: lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  typos:
    name: typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@v1.29.4
        with:
          config: ./_typos.toml

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint workflows
        run: |
          # Pin actionlint installer to a specific tag rather than `main`
          # so a poisoned upstream commit cannot inject code into CI.
          bash <(curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.4/scripts/download-actionlint.bash)
          ./actionlint -color

  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install yamllint==1.35.1
      - run: yamllint -c .yamllint.yml .

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          config: .markdownlint.json
          globs: |
            **/*.md
            !derivatives/**
            !node_modules/**
            !research/collection/*/*/source.md

  matlab-syntax:
    name: matlab syntax (checkcode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: matlab-actions/setup-matlab@v2
        with:
          release: R2024a
      - name: Run checkcode on src/matlab
        uses: matlab-actions/run-command@v2
        with:
          command: |
            files = dir(fullfile('src','matlab','**','*.m'));
            if isempty(files)
                error('hbn:lint:no_sources', ...
                    'No MATLAB sources found under src/matlab; refusing to pass.');
            end
            paths = fullfile({files.folder}, {files.name});
            issues = checkcode(paths{:}, '-id', '-severity');
            n = 0;
            for k = 1:numel(issues)
                msgs = issues{k};
                for j = 1:numel(msgs)
                    fprintf('%s:%d: [%s] %s\n', paths{k}, msgs(j).line, msgs(j).id, msgs(j).message);
                    if ~isempty(msgs(j).severity) && msgs(j).severity > 0
                        n = n + 1;
                    end
                end
            end
            if n > 0
                error('checkcode found %d severe issues.', n);
            end
