repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        # tests/fixtures/ mirrors upstream HBN sidecars byte-for-byte.
        exclude: \.(set|fdt|bdf|edf|mat)$|^tests/fixtures/
      - id: end-of-file-fixer
        # tests/fixtures/ mirrors upstream HBN sidecars byte-for-byte;
        # do not rewrite their final newlines.
        exclude: \.(set|fdt|bdf|edf|mat|tsv)$|^tests/fixtures/
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        # Lit-review PDFs (CC-BY/PD/open-archive) can run 5-30 MB; cap at 30 MB.
        # EEG data files (.bdf .edf .set .fdt .mat) are gitignored, not bypassed by this limit.
        args: [--maxkb=30000]
      - id: mixed-line-ending
        args: [--fix=lf]
        # Skip binary EEG formats; the hook treats unknown files as text
        # and would corrupt BDF/EDF/SET/FDT/MAT by rewriting bytes that
        # happen to match CRLF/CR patterns.
        exclude: \.(set|fdt|bdf|edf|mat)$

  - repo: https://github.com/crate-ci/typos
    rev: v1.29.4
    hooks:
      - id: typos
        args: [--config=_typos.toml]
        # PDF-converted source.md and BibTeX have OCR/author-name false positives;
        # _typos.toml extend-exclude is ignored when files are passed explicitly.
        # tests/fixtures/ carries upstream HBN sidecars verbatim, so any
        # spelling artifacts present in the source dataset stay untouched.
        exclude: ^research/collection/[^/]+/[^/]+/source\.md$|^research/collection/[^/]+/[^/]+\.bib$|^proposals/[^/]+/[^/]+/refs\.bib$|^proposals/[^/]+/[^/]+/lit-review/[^/]+\.bib$|^tests/fixtures/

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-c, .yamllint.yml]

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.14.0
    hooks:
      - id: markdownlint-cli2
        args: [--config, .markdownlint.json]
        # source.md files under research/collection are PDF-converted (Mistral / markitdown).
        # Their headings and ordered lists reflect publisher layout, not authored markdown.
        exclude: ^research/collection/.+/source\.md$

  # Python linting; only fires when .py files are staged
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix, --unsafe-fixes]
      - id: ruff-format

  # MATLAB style + lint via miss_hit (lightweight, no MATLAB install needed).
  # miss_hit doesn't ship a .pre-commit-hooks.yaml, so wrap as local hooks.
  # Install once: `uv tool install miss_hit` (or `pipx install miss_hit`).
  - repo: local
    hooks:
      - id: mh_style
        name: mh_style
        entry: mh_style --fix
        language: system
        files: \.m$
        pass_filenames: true
      - id: mh_lint
        name: mh_lint
        entry: mh_lint
        language: system
        files: \.m$
        pass_filenames: true
