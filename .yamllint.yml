extends: default

rules:
  line-length:
    max: 140
    level: warning
  truthy:
    check-keys: false
  document-start: disable
  comments:
    min-spaces-from-content: 1
  comments-indentation: disable
  indentation:
    spaces: 2
    indent-sequences: consistent

ignore: |
  derivatives/
  .venv/
  node_modules/
